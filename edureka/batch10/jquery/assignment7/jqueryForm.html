<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="http://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
    <title>Document</title>
    <style>
        .ui-mobile [data-role=header],.ui-mobile [data-role=footer]{
            background-color: rgba(0, 89, 187, 0.71);
            color: beige;
            text-shadow: 1px 1px 12px #000;
            font-size: 22px;
        }
        img{
            width:100%;
        }
        form label,legend
        {
            color:#123456;
        }
        p{
            text-align:center;
        }
        span{
            color:red;
        }
    </style>
</head>
<body>

<div data-role="page">
    <div data-role="header">
        <h1>Mobile Form</h1>

        <div data-role="header" data-position="fullscreen">
            <a href="#" class="ui-btn ui-corner-all ui-shadow ui-icon-home ui-btn-icon-left"> Home</a>
            <h1>Page Title</h1>
            <a href="#" class="ui-btn ui-corner-all ui-shadow ui-icon-search ui-btn-icon-left">Search</a>

            <div data-role="navbar">
                <ul>
                    <li> <a href="#home" data-icon="home">Home</a></li>
                    <li> <a href="#" data-icon="search">Search</a></li>
                </ul>
            </div>
        </div> <!-- Header-->
    </div>
    <div data-role="main" class="ui-content" id="home">
        <form method="post" action="#pageone" data-ajax="false">
            <label for="name">Name : <span>*</span></label>
            <input type="text" name="name" id="name" placeholder="Name">
            <label for="email">Email: <span>*</span></label>
            <input type="email" id="email" name="email" placeholder="Email"/>
            <fieldset data-role="controlgroup">
                <legend>Gender:</legend>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="male" value="male">
                <label for="female">Female</label>
                <input type="radio" name="gender" id="female" value="female">
            </fieldset>
            <fieldset data-role="controlgroup">
                <legend>Qualification:</legend>
                <label for="graduation">Graduation</label>
                <input type="checkbox" id="graduation" value="graduation">
                <label for="postgraduation">Post Graduation</label>
                <input type="checkbox" id="postgraduation" value="postgraduation">
                <label for="other">Other</label>
                <input type="checkbox" id="other" value="other">
            </fieldset>
            <label for="info">Message:</label>
            <textarea name="addinfo" id="info" placeholder="Message"></textarea>
            <input type="submit" data-inline="true" value="Submit" data-theme="b">
        </form>
    </div>
    <div data-role="footer">
        <h1>Created by Anshuman Biswal/h1>
    </div>
</div>



<div data-role="page" id="pageone">
    <!-------------- Second page header ----------->
    <div data-role="header">
        <h1>JQuery Mobile Form</h1>
        <div data-role="header" data-position="fullscreen">
            <a href="#home" class="ui-btn ui-corner-all ui-shadow ui-icon-home ui-btn-icon-left"> Home</a>
            <h1>Page Title</h1>
            <a href="#" class="ui-btn ui-corner-all ui-shadow ui-icon-search ui-btn-icon-left">Search</a>

            <div data-role="navbar">
                <ul>
                    <li> <a href="#home" data-icon="home">Home</a></li>
                    <li> <a href="#" data-icon="search">Search</a></li>
                </ul>
            </div>
        </div> <!-- Header-->
    </div>
    <!-------------- Second page main content ----------->
    <div data-role="main" class="ui-content">
        <h2>Form Submitted Successfully...!!</h2>
    </div>
</div>


<script src="http://code.jquery.com/jquery-1.11.1.min.js"></script>
<script src="http://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
<script>
    $(document).ready(function() {
        $("input[type=submit]").click(function(e) {
            var name = $("#name").val();
            var email = $("#email").val();
            if (name == '' || email == '') {
                e.preventDefault();
                alert("Please Fill Required Fields");
            }
        });
    });
</script>
</body>
</html>
